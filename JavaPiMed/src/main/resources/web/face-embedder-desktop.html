<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MedFlow Face Verification</title>
  <style>
    :root {
      --bg1: #0f2d6b;
      --bg2: #1398b8;
      --card: rgba(255, 255, 255, 0.95);
      --text: #0f1d3a;
      --muted: #5d6b85;
      --ok: #1e9f66;
      --danger: #de4f4f;
      --primary: #1f65ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Segoe UI, Arial, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 10% 20%, rgba(255,255,255,0.2), transparent 40%),
                  linear-gradient(120deg, var(--bg1), var(--bg2));
      display: grid;
      place-items: center;
      padding: 18px;
    }
    .card {
      width: min(860px, 100%);
      background: var(--card);
      border-radius: 20px;
      box-shadow: 0 30px 80px rgba(3, 16, 47, 0.35);
      padding: 20px;
      display: grid;
      gap: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .title { margin: 0; font-size: 24px; }
    .subtitle { margin: 4px 0 0; color: var(--muted); }
    .badge {
      border: 1px solid #d9e2ff;
      color: #1748b6;
      background: #eef3ff;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }
    .video-wrap {
      border-radius: 14px;
      border: 1px solid #d7def2;
      overflow: hidden;
      position: relative;
      background: #0d162d;
      height: 430px;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
      background: #0d162d;
    }
    .overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      border: 3px solid rgba(33, 183, 120, 0.7);
      border-radius: 14px;
      box-shadow: inset 0 0 0 9999px rgba(0, 0, 0, 0.15);
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    button {
      border: 0;
      border-radius: 10px;
      padding: 11px 14px;
      font-weight: 700;
      cursor: pointer;
      transition: transform .15s ease, opacity .15s ease;
    }
    button:hover { transform: translateY(-1px); }
    button:disabled { opacity: .6; cursor: not-allowed; transform: none; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-secondary { background: #f0f3fa; color: #23355a; }
    .status {
      min-height: 22px;
      color: var(--muted);
      font-size: 14px;
    }
    .status.ok { color: var(--ok); }
    .status.err { color: var(--danger); }
    .hint {
      margin: 0;
      color: #5f6f8f;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <main class="card">
    <header class="header">
      <div>
        <h1 class="title">Face Login Verification</h1>
        <p class="subtitle">Center your face, keep steady, and capture.</p>
      </div>
      <div class="badge">MedFlow Desktop</div>
    </header>

    <section class="video-wrap">
      <video id="video" autoplay playsinline muted></video>
      <div class="overlay"></div>
    </section>

    <div class="actions">
      <button id="startBtn" class="btn-secondary">Start camera</button>
      <button id="captureBtn" class="btn-primary" disabled>Verify my face</button>
      <button id="cancelBtn" class="btn-secondary">Cancel</button>
    </div>

    <div id="status" class="status">Ready.</div>
    <p class="hint">Tip: look at the camera, one face only, good lighting.</p>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/vision_bundle.js"></script>

  <script>
    (function () {
      const video = document.getElementById('video');
      const startBtn = document.getElementById('startBtn');
      const captureBtn = document.getElementById('captureBtn');
      const cancelBtn = document.getElementById('cancelBtn');
      const statusEl = document.getElementById('status');

      const mediapipeWasmRoot = 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm';
      const faceDetectorModelUrl = 'https://storage.googleapis.com/mediapipe-models/face_detector/blaze_face_short_range/float16/1/blaze_face_short_range.tflite';
      const imageEmbedderModelUrl = 'https://storage.googleapis.com/mediapipe-models/image_embedder/mobilenet_v3_small/float32/1/mobilenet_v3_small.tflite';

      let stream = null;
      let mpPromise = null;

      const setStatus = (msg, cls) => {
        statusEl.textContent = msg || '';
        statusEl.className = 'status' + (cls ? ' ' + cls : '');
      };

      const stopStream = () => {
        if (stream) {
          stream.getTracks().forEach(t => t.stop());
          stream = null;
        }
        video.srcObject = null;
      };

      const fail = (message) => {
        setStatus(message || 'Capture failed.', 'err');
        if (window.javaBridge && typeof window.javaBridge.onError === 'function') {
          window.javaBridge.onError(message || 'Capture failed.');
          return;
        }

        fetch('/face-cancel', { method: 'POST' }).catch(() => {});
      };

      window.onerror = function (msg) {
        setStatus('JS error: ' + String(msg || 'unknown'), 'err');
      };

      if (window.javaBridge && typeof window.javaBridge.onReady === 'function') {
        window.javaBridge.onReady('Face embedder script loaded');
      } else {
        setStatus('Browser mode ready. Camera will open here.', 'ok');
      }

      const getMp = async () => {
        if (mpPromise) return mpPromise;
        mpPromise = (async () => {
          const vision = window.vision;
          if (!vision) {
            throw new Error('MediaPipe library did not load. Check internet access.');
          }
          const fileset = await vision.FilesetResolver.forVisionTasks(mediapipeWasmRoot);

          const tryCreate = async (delegate) => {
            const detectorBase = { modelAssetPath: faceDetectorModelUrl };
            if (delegate) detectorBase.delegate = delegate;
            const faceDetector = await vision.FaceDetector.createFromOptions(fileset, {
              baseOptions: detectorBase,
              runningMode: 'VIDEO'
            });

            const embedderBase = { modelAssetPath: imageEmbedderModelUrl };
            if (delegate) embedderBase.delegate = delegate;
            const embedder = await vision.ImageEmbedder.createFromOptions(fileset, {
              baseOptions: embedderBase,
              runningMode: 'IMAGE'
            });
            return { faceDetector, embedder };
          };

          try {
            return await tryCreate('GPU');
          } catch (_) {
            return await tryCreate(null);
          }
        })();
        return mpPromise;
      };

      const l2Normalize = (vec) => {
        let norm = 0;
        for (let i = 0; i < vec.length; i++) norm += vec[i] * vec[i];
        norm = Math.sqrt(norm);
        if (!Number.isFinite(norm) || norm <= 0) throw new Error('Invalid embedding.');
        for (let i = 0; i < vec.length; i++) vec[i] /= norm;
        return vec;
      };

      const getSingleFaceBbox = (detections) => {
        if (!Array.isArray(detections) || detections.length !== 1) {
          throw new Error('Please keep exactly one face in frame.');
        }
        const d = detections[0];
        let score = null;
        if (d && d.categories && d.categories.length > 0 && typeof d.categories[0].score === 'number') {
          score = d.categories[0].score;
        }
        if (typeof score === 'number' && score < 0.6) {
          throw new Error('Face detection too weak.');
        }
        const bb = d && d.boundingBox ? d.boundingBox : null;
        if (!bb) throw new Error('Face not found.');
        const x = Number(bb.originX), y = Number(bb.originY), w = Number(bb.width), h = Number(bb.height);
        if (![x, y, w, h].every(Number.isFinite) || w <= 0 || h <= 0) {
          throw new Error('Invalid face box.');
        }
        return { x, y, w, h };
      };

      const cropFaceToCanvas = (bbox) => {
        const vw = video.videoWidth || 0;
        const vh = video.videoHeight || 0;
        if (!vw || !vh) throw new Error('Camera not ready.');

        const pad = 0.35 * Math.max(bbox.w, bbox.h);
        let sx = Math.max(0, bbox.x - pad);
        let sy = Math.max(0, bbox.y - pad);
        let sw = Math.min(vw - sx, bbox.w + pad * 2);
        let sh = Math.min(vh - sy, bbox.h + pad * 2);

        const canvas = document.createElement('canvas');
        canvas.width = 224;
        canvas.height = 224;
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        if (!ctx) throw new Error('Cannot read camera frame.');

        ctx.drawImage(video, sx, sy, sw, sh, 0, 0, canvas.width, canvas.height);
        return canvas;
      };

      const extractEmbedding = (res) => {
        const floats = res && res.embeddings && res.embeddings[0] ? res.embeddings[0].floatEmbedding : null;
        if (!floats || typeof floats.length !== 'number' || floats.length < 64) {
          throw new Error('Embedding unavailable.');
        }
        return l2Normalize(Array.from(floats, v => Number(v)));
      };

      const captureEmbeddingOnce = async () => {
        const mp = await getMp();
        const det = mp.faceDetector.detectForVideo(video, performance.now());
        const detections = det && det.detections ? det.detections : [];
        const bbox = getSingleFaceBbox(detections);
        const faceCanvas = cropFaceToCanvas(bbox);
        const embRes = mp.embedder.embed(faceCanvas);
        return extractEmbedding(embRes);
      };

      const sleep = (ms) => new Promise(r => setTimeout(r, ms));

      const captureEmbedding = async () => {
        const vectors = [];
        const count = 10;
        for (let i = 0; i < count; i++) {
          setStatus(`Capturing ${i + 1}/${count}...`);
          vectors.push(await captureEmbeddingOnce());
          if (i < count - 1) await sleep(90);
        }

        const dim = vectors[0].length;
        const sum = new Array(dim).fill(0);
        for (const v of vectors) {
          if (v.length !== dim) throw new Error('Inconsistent embedding size.');
          for (let i = 0; i < dim; i++) sum[i] += v[i];
        }
        const avg = sum.map(x => x / vectors.length);
        return l2Normalize(avg);
      };

      startBtn.addEventListener('click', async () => {
        try {
          setStatus('Starting camera...');
          if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            if (window.javaBridge && typeof window.javaBridge.captureNativeEmbedding === 'function') {
              setStatus('Camera API unavailable here. Switching to native desktop camera...', 'ok');
              startBtn.disabled = true;
              captureBtn.disabled = true;
              cancelBtn.disabled = true;
              window.javaBridge.captureNativeEmbedding();
              return;
            }
            throw new Error('Camera API unavailable in this desktop runtime.');
          }
          stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
          video.srcObject = stream;
          await video.play();
          await getMp();
          setStatus('Ready.', 'ok');
          captureBtn.disabled = false;
          startBtn.disabled = true;
        } catch (e) {
          if (window.javaBridge && typeof window.javaBridge.captureNativeEmbedding === 'function') {
            setStatus('Web camera failed. Switching to native desktop camera...', 'ok');
            startBtn.disabled = true;
            captureBtn.disabled = true;
            cancelBtn.disabled = true;
            window.javaBridge.captureNativeEmbedding();
            return;
          }
          const msg = e && e.message ? e.message : 'Camera unavailable.';
          setStatus(msg, 'err');
        }
      });

      captureBtn.addEventListener('click', async () => {
        captureBtn.disabled = true;
        cancelBtn.disabled = true;
        try {
          const vec = await captureEmbedding();
          const payload = { v: 2, type: 'mp_image_embedder_face_crop_v1', vec };
          setStatus('Embedding captured.', 'ok');
          if (window.javaBridge && typeof window.javaBridge.onEmbedding === 'function') {
            window.javaBridge.onEmbedding(JSON.stringify(payload));
          } else {
            const res = await fetch('/face-result', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload)
            });
            if (!res.ok) {
              throw new Error('Desktop callback failed.');
            }
            setStatus('Done. Return to MedFlow app.', 'ok');
            setTimeout(() => {
              window.close();
            }, 400);
          }
        } catch (e) {
          captureBtn.disabled = false;
          cancelBtn.disabled = false;
          const msg = e && e.message ? e.message : 'Capture failed.';
          setStatus(msg, 'err');
        }
      });

      cancelBtn.addEventListener('click', () => {
        stopStream();
        if (window.javaBridge && typeof window.javaBridge.onCancel === 'function') {
          window.javaBridge.onCancel();
          return;
        }
        fetch('/face-cancel', { method: 'POST' }).catch(() => {});
        setTimeout(() => {
          window.close();
        }, 120);
      });

      window.addEventListener('beforeunload', stopStream);

      // Auto-start for smoother UX and quicker diagnostics.
      setTimeout(function () {
        if (!startBtn.disabled) {
          startBtn.click();
        }
      }, 200);
    })();
  </script>
</body>
</html>
