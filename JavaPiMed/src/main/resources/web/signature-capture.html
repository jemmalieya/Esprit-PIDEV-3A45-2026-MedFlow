<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MedFlow Signature Capture</title>
  <style>
    :root {
      color-scheme: light;
      --panel: #f8fafc;
      --surface: #ffffff;
      --line: #d9e2ec;
      --ink: #0f172a;
      --accent: #0f766e;
      --accent-soft: rgba(15, 118, 110, 0.16);
      --danger: #b91c1c;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(15, 118, 110, 0.14), transparent 34%),
        linear-gradient(180deg, #f8fafc 0%, #eef6ff 100%);
      color: var(--ink);
    }

    .shell {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 14px;
      min-height: 100vh;
    }

    .stage {
      position: relative;
      overflow: hidden;
      border-radius: 20px;
      border: 1px solid rgba(148, 163, 184, 0.35);
      background: #0f172a;
      min-height: 250px;
      box-shadow: 0 18px 44px rgba(15, 23, 42, 0.18);
    }

    video,
    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #signatureCanvas {
      pointer-events: none;
    }

    .hud {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(148, 163, 184, 0.28);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 13px;
      font-weight: 600;
    }

    .hint {
      font-size: 12px;
      color: #475569;
    }

    .error {
      color: var(--danger);
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-primary {
      background: #0f766e;
      color: white;
    }

    .btn-secondary {
      background: #e2e8f0;
      color: #0f172a;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="hud">
      <div class="badge" id="gestureBadge">Initializing camera...</div>
      <div class="hint" id="hintText">Pinch thumb + index finger to draw your signature.</div>
    </div>

    <div class="stage">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="overlayCanvas"></canvas>
      <canvas id="signatureCanvas"></canvas>
    </div>

    <div class="actions">
      <button id="sendButton" class="btn btn-primary" type="button">Send signature to MedFlow</button>
      <button id="clearButton" class="btn btn-secondary" type="button">Clear drawing</button>
    </div>
  </div>

  <script type="module">
    import {
      FilesetResolver,
      HandLandmarker
    } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18";

    const video = document.getElementById("video");
    const overlayCanvas = document.getElementById("overlayCanvas");
    const signatureCanvas = document.getElementById("signatureCanvas");
    const overlayCtx = overlayCanvas.getContext("2d");
    const signatureCtx = signatureCanvas.getContext("2d");
    const gestureBadge = document.getElementById("gestureBadge");
    const hintText = document.getElementById("hintText");
    const sendButton = document.getElementById("sendButton");
    const clearButton = document.getElementById("clearButton");

    let handLandmarker;
    let animationFrameId = null;
    let lastPoint = null;
    let isDrawing = false;
    let stream = null;

    function notifyStatus(message) {
      gestureBadge.textContent = message;
      if (window.javaBridge?.onStatusChanged) {
        window.javaBridge.onStatusChanged(message);
      }
    }

    function notifyError(message) {
      gestureBadge.textContent = message;
      gestureBadge.classList.add("error");
      if (window.javaBridge?.onError) {
        window.javaBridge.onError(message);
      }
    }

    function resizeCanvases() {
      const rect = video.getBoundingClientRect();
      const width = Math.max(1, Math.floor(rect.width));
      const height = Math.max(1, Math.floor(rect.height));

      [overlayCanvas, signatureCanvas].forEach((canvas) => {
        if (canvas.width !== width || canvas.height !== height) {
          canvas.width = width;
          canvas.height = height;
        }
      });

      signatureCtx.lineCap = "round";
      signatureCtx.lineJoin = "round";
      signatureCtx.strokeStyle = "#111827";
      signatureCtx.lineWidth = 4;
    }

    function distance(a, b) {
      const dx = a.x - b.x;
      const dy = a.y - b.y;
      return Math.sqrt(dx * dx + dy * dy);
    }

    function mirrorX(normalizedX) {
      return (1 - normalizedX) * overlayCanvas.width;
    }

    function mapY(normalizedY) {
      return normalizedY * overlayCanvas.height;
    }

    function drawLandmarks(landmarks) {
      overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
      overlayCtx.strokeStyle = "rgba(255,255,255,0.85)";
      overlayCtx.lineWidth = 2;
      overlayCtx.fillStyle = "rgba(14,165,233,0.95)";

      for (const point of landmarks) {
        const x = mirrorX(point.x);
        const y = mapY(point.y);
        overlayCtx.beginPath();
        overlayCtx.arc(x, y, 4, 0, Math.PI * 2);
        overlayCtx.fill();
      }
    }

    function drawSignaturePoint(point) {
      if (!lastPoint) {
        lastPoint = point;
        return;
      }

      signatureCtx.beginPath();
      signatureCtx.moveTo(lastPoint.x, lastPoint.y);
      signatureCtx.lineTo(point.x, point.y);
      signatureCtx.stroke();
      lastPoint = point;
    }

    async function setupCamera() {
      stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: "user",
          width: { ideal: 960 },
          height: { ideal: 540 }
        },
        audio: false
      });

      video.srcObject = stream;
      await video.play();
      resizeCanvases();
      window.addEventListener("resize", resizeCanvases);
    }

    async function setupMediaPipe() {
      const vision = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm"
      );

      handLandmarker = await HandLandmarker.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task"
        },
        numHands: 1,
        runningMode: "VIDEO"
      });
    }

    function predictFrame() {
      if (!handLandmarker) {
        animationFrameId = requestAnimationFrame(predictFrame);
        return;
      }

      resizeCanvases();
      const now = performance.now();
      const result = handLandmarker.detectForVideo(video, now);
      overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);

      const landmarks = result?.landmarks?.[0];
      if (landmarks) {
        drawLandmarks(landmarks);

        const thumbTip = landmarks[4];
        const indexTip = landmarks[8];
        const pinchDistance = distance(thumbTip, indexTip);
        const pinchThreshold = 0.055;

        const point = {
          x: mirrorX(indexTip.x),
          y: mapY(indexTip.y)
        };

        if (pinchDistance <= pinchThreshold) {
          isDrawing = true;
          notifyStatus("Pinch detected: drawing signature");
          drawSignaturePoint(point);
        } else {
          if (isDrawing) {
            notifyStatus("Pinch released");
          } else {
            notifyStatus("Move hand into frame and pinch to draw");
          }
          isDrawing = false;
          lastPoint = null;
        }
      } else {
        notifyStatus("Hand not detected");
        isDrawing = false;
        lastPoint = null;
      }

      animationFrameId = requestAnimationFrame(predictFrame);
    }

    async function sendSignatureToApp() {
      const dataUrl = signatureCanvas.toDataURL("image/png");
      if (window.javaBridge?.onSignatureCaptured) {
        window.javaBridge.onSignatureCaptured(dataUrl);
      }

      try {
        const response = await fetch("/capture", {
          method: "POST",
          headers: {
            "Content-Type": "text/plain;charset=UTF-8"
          },
          body: dataUrl
        });

        if (!response.ok) {
          throw new Error("Capture endpoint returned " + response.status);
        }

        notifyStatus("Signature sent to MedFlow");
        hintText.textContent = "Signature received by MedFlow. Return to the app and save the fiche.";
      } catch (error) {
        console.error(error);
        notifyError("Unable to send signature back to MedFlow");
      }
    }

    window.captureSignature = () => {
      sendSignatureToApp();
    };

    window.clearSignature = () => {
      signatureCtx.clearRect(0, 0, signatureCanvas.width, signatureCanvas.height);
      overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
      lastPoint = null;
      isDrawing = false;
      if (window.javaBridge?.onSignatureCleared) {
        window.javaBridge.onSignatureCleared();
      }
      notifyStatus("Signature canvas cleared");
    };

    window.shutdownSignatureCapture = () => {
      if (animationFrameId) {
        cancelAnimationFrame(animationFrameId);
        animationFrameId = null;
      }
      if (stream) {
        stream.getTracks().forEach((track) => track.stop());
        stream = null;
      }
    };

    sendButton.addEventListener("click", () => {
      sendSignatureToApp();
    });

    clearButton.addEventListener("click", () => {
      window.clearSignature();
    });

    async function boot() {
      try {
        await setupCamera();
        await setupMediaPipe();
        notifyStatus("Camera ready");
        hintText.textContent = "Pinch thumb + index finger to sign, then click Capture.";
        if (window.javaBridge?.onReady) {
          window.javaBridge.onReady();
        }
        predictFrame();
      } catch (error) {
        console.error(error);
        notifyError("Camera or MediaPipe initialization failed");
        hintText.textContent = error?.message || "Check camera permission and internet access for MediaPipe assets.";
      }
    }

    boot();
  </script>
</body>
</html>
